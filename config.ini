; Caminhos para logs, BOM, base de dados, logo e Description.
; Use . para a pasta da aplicação, ou um caminho absoluto (ex: C:\Warehouse\Logs).
; As pastas são criadas automaticamente se não existirem.

[paths]
log = .
db = .
logo = logo.png
description = Description.csv
; db pode ser pasta (gera warehouse.db) ou caminho completo para .db
; logo e description aceitam pasta ou caminho completo para ficheiro

; Opções dos dropdowns (Projeto/Linha e Turno). Valores separados por vírgula.
[dropdowns]
projetos_linhas = Volvo, Renault
turnos = Turno A, Turno B, Turno C
destinos = Scrap, Retrabalho
postos = Posto 1, Posto 2, Posto 3, Posto 4, Posto 5, Posto 6, Posto 7, Posto 8, Posto 9, Posto 10

; Destinos e postos dos dropdowns no painel de leitura (valores separados por virgula)
